schemaVersion: 1
name: "srvcs-covariance"
slug: "covariance"
repository: "srvcs/covariance"
package: "srvcs-covariance"
function: "statistics: population covariance"
kind: "orchestrator"
categories:
  - "statistics"
dependencies:
  - slug: "sum"
    service: "srvcs-sum"
  - slug: "floatdivide"
    service: "srvcs-floatdivide"
  - slug: "floatsubtract"
    service: "srvcs-floatsubtract"
  - slug: "floatmultiply"
    service: "srvcs-floatmultiply"
  - slug: "floatadd"
    service: "srvcs-floatadd"
endpoints:
  - method: "GET"
    path: "/"
    purpose: "Service identity"
  - method: "POST"
    path: "/"
    purpose: "Evaluate the service function"
  - method: "GET"
    path: "/healthz"
    purpose: "Liveness probe"
  - method: "GET"
    path: "/readyz"
    purpose: "Readiness probe"
  - method: "GET"
    path: "/metrics"
    purpose: "Prometheus metrics"
  - method: "GET"
    path: "/openapi.json"
    purpose: "OpenAPI document"
inputs:
  - name: "a"
    type: "json[]"
    required: true
  - name: "b"
    type: "json[]"
    required: true
outputs:
  - name: "a"
    type: "json[]"
  - name: "b"
    type: "json[]"
  - name: "result"
    type: "number"
configuration:
  - name: "SRVCS_BIND_ADDR"
    default: "0.0.0.0:8080"
    purpose: "Bind address"
  - name: "SRVCS_ENV"
    default: "development"
    purpose: "Environment label for logs"
  - name: "RUST_LOG"
    default: "info,tower_http=info"
    purpose: "Tracing filter"
  - name: "SRVCS_FLOATADD_URL"
    default: "http://127.0.0.1:8094"
    purpose: "Base URL for srvcs-floatadd"
  - name: "SRVCS_FLOATDIVIDE_URL"
    default: "http://127.0.0.1:8091"
    purpose: "Base URL for srvcs-floatdivide"
  - name: "SRVCS_FLOATMULTIPLY_URL"
    default: ""
    purpose: "Base URL for srvcs-floatmultiply"
  - name: "SRVCS_FLOATSUBTRACT_URL"
    default: ""
    purpose: "Base URL for srvcs-floatsubtract"
  - name: "SRVCS_SUM_URL"
    default: "http://127.0.0.1:8090"
    purpose: "Base URL for srvcs-sum"
